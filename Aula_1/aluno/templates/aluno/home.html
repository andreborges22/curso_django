<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Módulo de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1>Cadastro de Alunos</h1>
    <!--<h1>Cadastro de Alunos</h1>-->
    <!-- fdsfsdfsd  -->
    <hr>
    <form action="{% url 'cadastrar_aluno' %}" method="post" class="form-control">
        {% csrf_token %} 
        <label>Nome</label>
        <br>       
        <input name="nome" id="nome" required = "true" placeholder="Informe o nome">
        <br>
        <label>email</label>
        <br>
        <input type="email" name="email" id="email" placeholder="Informe um email válido">
        <br>
        <label>sexo</label>
        <br>
        <select id="sexo" name="sexo" required = "true">
                <option value="">Informe seu sexo</option>
                    {% for sexo in sexos %}
                        <option value="{{ sexo.descricao }}">
                            {{ sexo.descricao }}
                        </option>
                    {% endfor %}
        </select> 
        <br>
        <label>Telefone</label>
        <br>
        <input name="telefone" id="telefone">
        <br>     
        <label>Endereço</label>
        <br>
        <input name="endereco" id="endereco">
        <br>     
        <br>   
        <button type="submit" class="btn btn-success">Salvar</button>
        <br>
    </form>
    <hr>
    <h1>Lista de Alunos</h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
   <table class="table">
    <thead>
        <tr>
        <th scope="col">ID</th>
        <th scope="col">Nome</th>        
        <th scope="col">Email</th>
        <th scope="col">Sexo</th>
        <th scope="col">Telefone</th>
        <th scope="col">Endereço</th>
        <th scope="col">Editar</th>
        <th scope="col">Deletar</th>
        </tr>
    </thead>
        <tbody>
            <tr>      
              {% for aluno in alunos %}  
                    <tr>
                        <td>{{aluno.id}}</td> 
                        <td>{{aluno.nome}}</td>
                        <td>{{aluno.email}}</td>
                        <td>{{aluno.sexo}}</td>
                        <td>{{aluno.telefone}}</td>
                        <td>{{aluno.endereco}}</td>
                        <td><a href="{% url 'editar_aluno' aluno.id %}"><button name="editar" id="editar" class="btn btn-success">Editar</button></a></td>
                        <td><a href="{% url 'excluir_aluno' aluno.id %}"><button name="excluir" id="excluir" class="btn btn-danger">Excluir</button></a></td>
                    </tr>
              {% endfor %}
            </tr>        
        </tbody>
    </table>
</html>
